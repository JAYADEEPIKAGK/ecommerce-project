<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <title>E-Commerce Store</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    #products {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      border: 1px solid #ccc;
      padding: 15px;
      width: 200px;
      border-radius: 10px;
      background: white;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: darkgreen;
    }

    #cart, #orderForm {
      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0 10px;
    }

    .remove-btn {
      background: red;
      margin-left: 10px;
    }
  </style>
</head>

<body>

<h1>🛒 My Store</h1>

<button onclick="loadProducts()">Load Products</button>

<div id="products"><div class="card">
      <img src="./E-Commerce Store_files/phone.jpg">
      <h3>Smartphone</h3>
      <p>₹15000</p>
      <button onclick="addToCart(1)">Add to Cart</button>
    </div><div class="card">
      <img src="./E-Commerce Store_files/laptop.jpg">
      <h3>Laptop</h3>
      <p>₹50000</p>
      <button onclick="addToCart(2)">Add to Cart</button>
    </div><div class="card">
      <img src="./E-Commerce Store_files/headphones.jpg">
      <h3>Headphones</h3>
      <p>₹2000</p>
      <button onclick="addToCart(3)">Add to Cart</button>
    </div></div>

<!-- CART -->
<div id="cart">
  <h2>Cart</h2>
  <div id="cart-items"></div>
  <h3 id="total">Total: ₹0</h3>
</div>

<!-- ORDER FORM -->
<div id="orderForm">
  <h2>Place Order</h2>

  <input type="text" id="name" placeholder="Enter Name">
  <textarea id="address" placeholder="Enter Address"></textarea>
  <input type="number" id="phone" placeholder="Enter Phone Number">

  <button onclick="placeOrder()">Submit Order</button>

  <p id="message" style="color:green;">✅ Order Successful!<br>Name: deepika GK<br>Total: ₹65000</p>
</div>

<script>
const products = [
  { id: 1, name: "Smartphone", price: 15000, image: "phone.jpg" },
  { id: 2, name: "Laptop", price: 50000, image: "laptop.jpg" },
  { id: 3, name: "Headphones", price: 2000, image: "headphones.jpg" }
];

let cart = [];

function loadProducts() {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(product => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${product.image}">
      <h3>${product.name}</h3>
      <p>₹${product.price}</p>
      <button onclick="addToCart(${product.id})">Add to Cart</button>
    `;

    container.appendChild(div);
  });
}

function addToCart(id) {
  const product = products.find(p => p.id === id);
  cart.push(product);
  renderCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  renderCart();
}

function renderCart() {
  const cartDiv = document.getElementById("cart-items");
  const totalDiv = document.getElementById("total");

  cartDiv.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += item.price;

    const div = document.createElement("div");
    div.innerHTML = `
      ${item.name} - ₹${item.price}
      <button class="remove-btn" onclick="removeFromCart(${index})">X</button>
    `;

    cartDiv.appendChild(div);
  });

  totalDiv.innerText = "Total: ₹" + total;
}

function placeOrder() {
  const name = document.getElementById("name").value;
  const address = document.getElementById("address").value;
  const phone = document.getElementById("phone").value;

  if (!name || !address || !phone || cart.length === 0) {
    alert("Please fill all details and add items to cart!");
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price, 0);

  document.getElementById("message").innerText =
    "✅ Order Successful!\nName: " + name +
    "\nTotal: ₹" + total;

  // clear cart
  cart = [];
  renderCart();

  // clear form
  document.getElementById("name").value = "";
  document.getElementById("address").value = "";
  document.getElementById("phone").value = "";
}
</script>


</body></html>
